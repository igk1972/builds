name: build-caddy

on:
  workflow_dispatch:
    inputs:
      variant:       { description: "Which variant(s) to build", type: choice, options: [all, l4, docker], default: all }
      caddy_version: { description: "Caddy version (base caddy:<v> / caddy:<v>-builder)", type: string, default: "2.11" }
      push:          { description: "Push to ghcr (uncheck for a dry run)", type: boolean, default: true }

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      IMAGE: ghcr.io/igk1972/caddy
      STORAGE_DRIVER: overlay
      BUILDAH_ISOLATION: chroot
      BUILDAH_FORMAT: docker
    steps:
      - uses: actions/checkout@v5
      - name: Install buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah fuse-overlayfs uidmap
          buildah version
      - name: Configure rootless storage
        run: |
          mkdir -p ~/.config/containers
          cat > ~/.config/containers/storage.conf <<'EOF'
          [storage]
          driver = "overlay"
          graphroot = "${HOME}/.local/share/containers/storage"
          [storage.options.overlay]
          mount_program = "/usr/bin/fuse-overlayfs"
          EOF
      - name: Log in to ghcr.io
        run: buildah login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io
      - name: Build & push
        env:
          VARIANT: ${{ inputs.variant }}
          CADDY_VERSION: ${{ inputs.caddy_version }}
          PUSH: ${{ inputs.push }}
        run: |
          chmod +x projects/caddy/build.sh
          ./projects/caddy/build.sh
